<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>員工評分排行榜</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Inter', sans-serif;
}
.rank-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px;
    margin-bottom: 12px;
    border-radius: 12px;
    background: white;
    border: 1px solid #e2e8f0;
    box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    cursor: pointer;
    transition: background-color 0.2s, transform 0.1s;
}
.rank-item:hover {
    background-color: #f0f4ff;
    transform: translateY(-1px);
}
.rank-no {
    font-size: 20px;
    font-weight: bold;
    color: #4f46e5;
    min-width: 40px; 
    text-align: center;
}
.emp-score {
    text-align: right;
    font-size: 18px;
    font-weight: bold;
    color: #2563eb;
}
.detail {
    font-size: 12px;
    color: #666;
}
</style>
</head>

<body class="bg-gray-100">

<!-- 頂部導覽列 -->
<header class="sticky top-0 z-10 bg-white shadow-md border-b border-gray-200">
  <div class="container mx-auto px-4 h-20 flex items-center justify-between">

    <div class="flex items-center gap-3">
      <button
        onclick="showEmployeeList()"
        class="h-10 px-4 bg-gray-300 hover:bg-gray-400 text-gray-800 rounded-lg shadow flex items-center text-sm">
        返回列表
      </button>

      <img src="HongYipLogo.png" class="w-14 h-14 object-contain" >
      <h1 class="text-lg font-bold text-indigo-700">員工評分系統</h1>
    </div>

   <div class="flex gap-3 items-center flex-shrink-0">
      <button onclick="Ranklist()" 
              class="h-10 px-4 bg-blue-500 hover:bg-blue-600 text-white rounded-lg shadow text-sm">
        排行榜
      </button>
      <button onclick="logout()" 
              class="h-10 px-4 bg-red-500 hover:bg-red-600 text-white rounded-lg shadow text-sm">
        登出
      </button>
    </div>

  </div>
</header>

<!-- 主內容 -->
<main class="container mx-auto py-8 px-4 max-w-3xl">

  <div class="flex items-center max-w-[300px] overflow-hidden mb-4">
    <span class="text-gray-700 text-sm whitespace-nowrap mr-1">當前評核人：</span>
    <span
      id="currentEvaluatorDisplay"
      class="font-bold text-indigo-600 text-sm whitespace-nowrap overflow-hidden text-ellipsis">
    </span>
  </div>

  <h2 class="text-3xl font-bold mb-6 text-gray-800 border-b pb-2">🏆 員工評分排行榜</h2>

  <div id="rankList" class="text-center text-gray-500 py-10">載入中...</div>

</main>

<script>
const scriptURL = 'https://script.google.com/macros/s/AKfycby46B_BO5E6cbIxYUngBCcT1Las-zSElgx6k1Kf057WH5_T0xrVQvm1IpmEhAtT47jl/exec';    
function showEmployeeList() {
    window.location.href = "index.html";
}

// 登出
function logout() {
    const confirmed = confirm("您確定要登出嗎？\n登出後將返回登入頁面。");
    if (confirmed) {
        localStorage.removeItem("currentEvaluator");
        window.location.href = "login.html";
    }
}

function Ranklist() {
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function goToEmployee(empId) {
    window.location.href = `index.html#detail-${empId}`;
}

// 讀取員工姓名與英文名對照表
async function loadEmployeeMap() {
    try {
        const res = await fetch(`${scriptURL}?action=getEmployeeList`);
        const json = await res.json();
        if (!json.success) return {};
        const map = {};
        json.data.forEach(emp => {
            map[emp.員工編號] = {
                name: emp.員工姓名,
                englishName: emp.英文名 || "" // 讀取英文名欄位
            };
        });
        return map;
    } catch (err) {
        console.error("讀取員工列表失敗:", err);
        return {};
    }
}

// 主流程
document.addEventListener("DOMContentLoaded", async () => {
    const evaluator = localStorage.getItem("currentEvaluator");
    if (!evaluator) {
        window.location.href = "login.html";
        return;
    }

    document.getElementById("currentEvaluatorDisplay").textContent = evaluator;

    window.employeeMap = await loadEmployeeMap();
    loadRankList(evaluator);
});

// 取得排行數據
async function loadRankList(evaluator) {
    const url = `${scriptURL}?action=getAllEvaluatorRatings&evaluator=${encodeURIComponent(evaluator)}`;
    const container = document.getElementById("rankList");

    try {
        const response = await fetch(url);
        const json = await response.json();

        if (!json.success || !json.data || json.data.length === 0) {
            container.innerHTML = `
                <div class="p-10 text-center bg-white rounded-lg shadow border">
                    <p class="text-gray-500 text-lg">尚未有任何評分紀錄</p>
                </div>`;
            return;
        }

        const list = json.data;

        const ranked = list.map(item => {
            const id = item.員工編號;
            const empInfo = window.employeeMap[id] || { name: "(未有姓名)", englishName: "" };
            return {
                員工編號: id,
                員工姓名: empInfo.name,
                英文名: empInfo.englishName,
                tourTotal: item.tourTotal || 0,
                interviewTotal: item.interviewTotal || 0,
                total: (item.tourTotal || 0) + (item.interviewTotal || 0)
            };
        }).sort((a, b) => b.total - a.total);

        renderRankList(ranked);

    } catch (err) {
        container.innerHTML = `
            <div class="p-10 text-center bg-white rounded-lg shadow border text-red-600">
                無法載入排行榜<br><small>${err.message}</small>
            </div>`;
    }
}

// 渲染排行榜
function renderRankList(data) {
    const container = document.getElementById("rankList");
    if (data.length === 0) {
        container.innerHTML = `<p class="text-center text-gray-500 py-10">無評分數據</p>`;
        return;
    }

    container.innerHTML = data.map((emp, index) => {
        // 組合姓名顯示：如果英文名存在則顯示「中文名 (英文名)」
        const displayName = emp.英文名 
            ? `${emp.員工姓名} <span class="text-gray-500 font-normal text-base ml-1">(${emp.英文名})</span>`
            : emp.員工姓名;

        return `
            <div class="rank-item" onclick="goToEmployee('${emp.員工編號}')">
                <div class="rank-no">#${index + 1}</div>
                <div class="flex-1 ml-4 text-left">
                    <div class="font-semibold text-lg flex items-baseline">
                        ${displayName}
                    </div>
                    <div class="text-sm text-gray-500">員工編號：${emp.員工編號}</div>
                </div>
                <div class="emp-score">
                    <div class="text-2xl">${emp.total.toFixed(1)} 分</div>
                </div>
            </div>
        `;
    }).join('');
}
</script>

</body>
</html>
