<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>員工評分系統 - 考察團與會面評分</title>
    
    <!-- 載入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
    
</head>
<body class="bg-gray-100 font-sans">
    <div id="customMessageBox" class="custom-message-box"></div>
    
    <!-- 頂部導覽列 -->
    <header class="sticky top-0 z-10 bg-white shadow-md border-b border-gray-200">
        <div class="container mx-auto px-4 h-20 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <button onclick="showEmployeeList()" id="returnToListButton"
                    class="h-10 px-4 bg-indigo-500 hover:bg-indigo-600 text-white rounded-lg shadow flex items-center text-sm">
                    ← 返回列表
                </button>
                <img src="HongYipLogo.png" class="w-14 h-14 object-contain" alt="logo" onerror="this.style.display='none'">
                <h1 class="text-lg font-bold text-indigo-700">員工評分系統</h1>
            </div>
            <div class="flex gap-3 items-center flex-shrink-0">
                <button onclick="Ranklist()" class="h-10 px-4 bg-blue-500 hover:bg-blue-600 text-white rounded-lg shadow text-sm">🏆 排行榜</button>
                <button onclick="logout()" class="h-10 px-4 bg-red-500 hover:bg-red-600 text-white rounded-lg shadow text-sm">登出</button>
            </div>
        </div>
    </header>

    <main class="container mx-auto py-6">
        <div class="flex items-center max-w-[300px] overflow-hidden mb-5 bg-white p-2 rounded-lg shadow-sm">
            <span class="text-gray-700 text-sm whitespace-nowrap mr-1">當前評核人：</span>
            <span id="currentEvaluatorDisplay" class="font-bold text-indigo-600 text-sm truncate"></span>
        </div>
        
        <div id="employeeList">
            <h2 class="text-2xl font-bold text-gray-800 mb-5 border-b pb-2">📋 所有員工</h2>
            <div class="employee-grid" id="employeeGrid">
                <div class="loading text-center p-10 text-gray-500">載入員工資料中...</div>
            </div>
        </div>
        
        <div id="employeeDetail" style="display: none;">
            <div id="basicContent"></div>
        </div>
    </main>

    <script>
    // ======================== 全域設定 ========================
    const SPREADSHEET_ID = '1znQ2MapAc4fqXJc3SDxoixbrd-b6Xry4auf8vFIcqDc';
    const API_KEY = 'AIzaSyDj2ktQ36AoBSrYxPj_R4USvzvLtfh8Kb0'; 
    const scriptURL = 'https://script.google.com/macros/s/AKfycby46B_BO5E6cbIxYUngBCcT1Las-zSElgx6k1Kf057WH5_T0xrVQvm1IpmEhAtT47jl/exec';
    
    const SHEETS = {
        BASIC: '員工資料',
        EDUCATION: '學歷／專業資格',
        EXPERIENCE: '工作經驗',
        EMPLOYMENT: '康業受僱記錄',
        RATING: '考察團評分選項',
        INTERVIEW_RATING: '會面評分選項',
        EVALUATORS: '評核人名單',
        TOUR_SCORE: '考察團整體評分',
        INTERVIEW_SCORE: '會面評分'
    };
    
    let evaluatorList = [];
    let currentEvaluator = null;
    let allEmployees = [];
    let educationData = [];
    let experienceData = [];
    let employmentData = [];
    let ratingOptions = [];
    let interviewRatingOptions = [];
    let currentEmployee = null;
    let employeeScores = {};
    let isDirty = false;
    let initialScores = {};
    let currentScores = {};
    let ratingDescriptions = {};
    
    // ======================== UI 輔助 ========================
    function showCustomMessage(message, type = 'info') {
        const msgBox = document.getElementById('customMessageBox');
        msgBox.textContent = message;
        msgBox.className = `custom-message-box show ${type}`;
        setTimeout(() => msgBox.classList.remove('show'), 3000);
    }
    
    function updateReturnButtonState(isListVisible) {
        const btn = document.getElementById('returnToListButton');
        if (!btn) return;
        if (isListVisible) {
            btn.disabled = true;
            btn.classList.remove('bg-indigo-500', 'hover:bg-indigo-600', 'text-white');
            btn.classList.add('bg-gray-300', 'text-gray-500', 'cursor-not-allowed');
        } else {
            btn.disabled = false;
            btn.classList.remove('bg-gray-300', 'text-gray-500', 'cursor-not-allowed');
            btn.classList.add('bg-indigo-500', 'hover:bg-indigo-600', 'text-white');
        }
    }
    
    // ======================== 資料讀取 ========================
    async function loadSheetData(sheetName) {
        const url = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${encodeURIComponent(sheetName)}?key=${API_KEY}`;
        try {
            const response = await fetch(url);
            const data = await response.json();
            if (!data.values) return [];
            const headers = data.values[0];
            const rows = data.values.slice(1);
            return rows.map(row => {
                const obj = {};
                headers.forEach((header, idx) => obj[header] = row[idx] || '');
                return obj;
            });
        } catch (err) {
            console.error(`載入 ${sheetName} 失敗:`, err);
            return [];
        }
    }
    
    async function loadAllEvaluatorRatings(evaluator) {
        if (!evaluator) return [];
        const url = `${scriptURL}?action=getAllEvaluatorRatings&evaluator=${encodeURIComponent(evaluator)}`;
        try {
            const resp = await fetch(url);
            const result = await resp.json();
            return result.success ? result.data : [];
        } catch (err) {
            console.error("載入所有評分失敗", err);
            return [];
        }
    }
    
    async function loadRatingDescriptions() {
        try {
            const resp = await fetch(`${scriptURL}?action=getRatingDescriptions`);
            const result = await resp.json();
            if (result.success) ratingDescriptions = result.data;
        } catch(e) { console.warn("說明載入失敗", e); }
    }
    
    async function loadAllData() {
        document.getElementById('employeeGrid').innerHTML = '<div class="text-center p-10 text-gray-500">載入中...</div>';
        const [basic, education, experience, employment, ratings, interviewRatings, evaluators, allRatings] = await Promise.all([
            loadSheetData(SHEETS.BASIC),
            loadSheetData(SHEETS.EDUCATION),
            loadSheetData(SHEETS.EXPERIENCE),
            loadSheetData(SHEETS.EMPLOYMENT),
            loadSheetData(SHEETS.RATING),
            loadSheetData(SHEETS.INTERVIEW_RATING),
            loadSheetData(SHEETS.EVALUATORS),
            loadAllEvaluatorRatings(currentEvaluator)
        ]);
        allEmployees = basic;
        educationData = education;
        experienceData = experience.map(r => ({ ...r, '入職前總年資': r['入職前總年資'] || '' }));
        employmentData = employment;
        evaluatorList = evaluators.map(e => e.評核人姓名 || e.評核人);
        
        ratingOptions = ratings.map(row => ({
            '評分項目': row['評分項目'] || '未命名',
            '最低分': parseInt(row['最低分']) || 0,
            '最高分': parseInt(row['最高分']) || 5,
            '說明': row['說明'] || ratingDescriptions[row['評分項目']] || ''
        }));
        interviewRatingOptions = interviewRatings.map(row => ({
            '評分項目': row['評分項目'] || '未命名',
            '最低分': parseInt(row['最低分']) || 0,
            '最高分': parseInt(row['最高分']) || 5,
            '說明': row['說明'] || ratingDescriptions[row['評分項目']] || ''
        }));
        
        employeeScores = allRatings.reduce((acc, score) => {
            acc[score.員工編號] = score;
            return acc;
        }, {});
        
        displayEmployees(allEmployees);
        handleHash();
    }
    
    function displayEmployees(employees) {
        const grid = document.getElementById('employeeGrid');
        if (!employees.length) { grid.innerHTML = '<div class="error">無員工資料</div>'; return; }
        grid.innerHTML = employees.map(emp => {
            const scores = employeeScores[emp.員工編號] || {};
            const tourTotal = scores.tourTotal !== undefined ? scores.tourTotal : null;
            const interviewTotal = scores.interviewTotal !== undefined ? scores.interviewTotal : null;
            const tourDisplay = tourTotal !== null ? `<span class="text-green-600 font-bold">${tourTotal} 分</span>` : '<span class="text-red-500">未評分</span>';
            const interviewDisplay = interviewTotal !== null ? `<span class="text-blue-600 font-bold">${interviewTotal} 分</span>` : '<span class="text-red-500">未評分</span>';
            return `
                <div class="employee-card" onclick="showEmployeeDetail('${emp.員工編號}')">
                    <h3>${emp.員工姓名 || '無姓名'} (${emp.員工編號 || ''})</h3>
                    <div class="text-sm text-gray-600"><strong>部門：</strong>${emp.部門 || '—'}</div>
                    <div class="text-sm text-gray-600 mb-2"><strong>職位：</strong>${emp.職位 || '—'}</div>
                    <div class="mt-3 pt-2 border-t space-y-1 text-sm">
                        <div class="flex justify-between"><span>🏆 考察團：</span>${tourDisplay}</div>
                        <div class="flex justify-between"><span>💬 會面：</span>${interviewDisplay}</div>
                    </div>
                </div>
            `;
        }).join('');
    }
    
    // ======================== 生成元件 ========================
    function generateRatingItems(options, prefix) {
        return options.map((option, idx) => {
            const desc = option.說明 || "無詳細說明";
            return `
                <div class="rating-item">
                    <div class="flex items-center gap-2 flex-wrap">
                        <span class="rating-title">${option.評分項目}</span>
                        <span class="rating-range">(${option.最低分} - ${option.最高分})</span>
                        <button type="button" class="text-gray-500 hover:text-indigo-600 text-sm" onclick="toggleDescription('${prefix}', ${idx})">ⓘ</button>
                    </div>
                    <div id="desc-${prefix}-${idx}" class="rating-description hidden mt-2">${desc}</div>
                    <div class="flex items-center gap-2 mt-2">
                        <input type="range" class="rating-slider flex-1" id="${prefix}-rating-${idx}" min="${option.最低分}" max="${option.最高分}" value="${option.最低分}" step="1">
                        <div class="rating-value-display w-12 text-center font-bold" id="${prefix}-value-${idx}">${option.最低分}</div>
                        <button class="lock-btn hidden text-xl" id="${prefix}-lock-${idx}" onclick="toggleSliderLock('${prefix}', ${idx})" title="解鎖此評分">🔒</button>
                    </div>
                </div>
            `;
        }).join('');
    }
    
    function generateScoreBreakdown(options, prefix) {
        return options.map((option, idx) => `<div class="score-item" id="${prefix}-breakdown-${idx}"><span>${option.評分項目}:</span><span>${option.最低分} 分</span></div>`).join('');
    }
    
    function calculateMaxScore(options) {
        return options.reduce((sum, opt) => sum + opt.最高分, 0);
    }
    
    function setupRatingSliders(options, prefix) {
        options.forEach((_, idx) => {
            const slider = document.getElementById(`${prefix}-rating-${idx}`);
            const valSpan = document.getElementById(`${prefix}-value-${idx}`);
            if (slider && valSpan) {
                slider.addEventListener('input', () => {
                    valSpan.textContent = slider.value;
                    updateTotalScore(options, prefix);
                    const key = `${prefix}_${options[idx].評分項目}`;
                    if (currentScores[key] !== undefined) currentScores[key] = slider.value;
                    checkDirtyState();
                });
            }
        });
    }
    
    function updateTotalScore(options, prefix) {
        let total = 0;
        options.forEach((opt, idx) => {
            const slider = document.getElementById(`${prefix}-rating-${idx}`);
            const breakdown = document.getElementById(`${prefix}-breakdown-${idx}`);
            if (slider && breakdown) {
                const val = parseInt(slider.value);
                total += val;
                breakdown.innerHTML = `<span>${opt.評分項目}:</span><span>${val} 分</span>`;
            }
        });
        const totalElem = document.getElementById(`${prefix}TotalScore`);
        if (totalElem) totalElem.textContent = `總分: ${total} / ${calculateMaxScore(options)}`;
    }
    
    function toggleDescription(prefix, idx) {
        const el = document.getElementById(`desc-${prefix}-${idx}`);
        if (el) el.classList.toggle('hidden');
    }
    
    function toggleSliderLock(prefix, idx) {
        const slider = document.getElementById(`${prefix}-rating-${idx}`);
        const lockBtn = document.getElementById(`${prefix}-lock-${idx}`);
        if (!slider) return;
        slider.disabled = !slider.disabled;
        if (slider.disabled) {
            slider.classList.add('opacity-50');
            lockBtn.textContent = '🔒';
        } else {
            slider.classList.remove('opacity-50');
            lockBtn.textContent = '🔓';
        }
    }
    
    // ======================== Dirty 追蹤 (含評語) ========================
    function initDirtyTrackers() {
        initialScores = {};
        currentScores = {};
        // 考察團滑桿
        ratingOptions.forEach((opt, idx) => {
            const slider = document.getElementById(`tour-rating-${idx}`);
            if (slider) {
                const key = `tour_${opt.評分項目}`;
                initialScores[key] = slider.value;
                currentScores[key] = slider.value;
                slider.addEventListener('input', function() {
                    currentScores[`tour_${opt.評分項目}`] = this.value;
                    checkDirtyState();
                });
            }
        });
        // 會面滑桿
        interviewRatingOptions.forEach((opt, idx) => {
            const slider = document.getElementById(`interview-rating-${idx}`);
            if (slider) {
                const key = `interview_${opt.評分項目}`;
                initialScores[key] = slider.value;
                currentScores[key] = slider.value;
                slider.addEventListener('input', function() {
                    currentScores[`interview_${opt.評分項目}`] = this.value;
                    checkDirtyState();
                });
            }
        });
        // 考察團評語
        const tourComment = document.getElementById('tour-comment');
        if (tourComment) {
            initialScores['tour_comment'] = tourComment.value;
            currentScores['tour_comment'] = tourComment.value;
            tourComment.addEventListener('input', (e) => {
                currentScores['tour_comment'] = e.target.value;
                checkDirtyState();
            });
        }
        // 會面評語
        const interviewComment = document.getElementById('interview-comment');
        if (interviewComment) {
            initialScores['interview_comment'] = interviewComment.value;
            currentScores['interview_comment'] = interviewComment.value;
            interviewComment.addEventListener('input', (e) => {
                currentScores['interview_comment'] = e.target.value;
                checkDirtyState();
            });
        }
        isDirty = false;
    }
    
    function checkDirtyState() {
        let dirty = false;
        for (let key in initialScores) {
            if (String(initialScores[key]) !== String(currentScores[key])) {
                dirty = true;
                break;
            }
        }
        isDirty = dirty;
    }
    
    // ======================== 歷史評分載入 ========================
    async function loadHistoryRatings(employeeId, evaluator) {
        const container = document.getElementById('historyRatingsContainer');
        if (!container) return;
        container.innerHTML = '<div class="text-center p-5 text-blue-500">載入評分歷史...</div>';
        try {
            const url = `${scriptURL}?action=getRatings&employeeId=${encodeURIComponent(employeeId)}&evaluator=${encodeURIComponent(evaluator)}`;
            const resp = await fetch(url);
            const result = await resp.json();
            if (!result.success || !result.data) {
                container.innerHTML = '<div class="text-center p-5 bg-gray-100 rounded-lg">無歷史評分記錄。</div>';
                return;
            }
            const { tour = [], interview = [] } = result.data;
            const latestTour = tour[0] || {};
            const latestInterview = interview[0] || {};
            
            setSlidersToLatest(latestTour, ratingOptions, 'tour');
            setSlidersToLatest(latestInterview, interviewRatingOptions, 'interview');
            updateTotalScore(ratingOptions, 'tour');
            updateTotalScore(interviewRatingOptions, 'interview');
            
            // 填入評語
            const tourComment = document.getElementById('tour-comment');
            if (tourComment && latestTour['評語']) tourComment.value = latestTour['評語'];
            const interviewComment = document.getElementById('interview-comment');
            if (interviewComment && latestInterview['評語']) interviewComment.value = latestInterview['評語'];
            
            const tourSum = calculateRecordsTotalSum(tour);
            const interviewSum = calculateRecordsTotalSum(interview);
            const combinedSum = tourSum + interviewSum;
            container.innerHTML = renderCombinedHistory({ tour, interview }, tourSum, interviewSum, combinedSum);
            
            initDirtyTrackers();
        } catch (err) {
            console.error(err);
            container.innerHTML = `<div class="text-red-600 p-5 bg-red-50 rounded-lg">載入失敗: ${err.message}</div>`;
        }
    }
    
    function setSlidersToLatest(latestRecord, options, prefix) {
        options.forEach((opt, idx) => {
            const slider = document.getElementById(`${prefix}-rating-${idx}`);
            const display = document.getElementById(`${prefix}-value-${idx}`);
            const lockBtn = document.getElementById(`${prefix}-lock-${idx}`);
            if (!slider || !display) return;
            const saved = latestRecord[opt.評分項目];
            if (saved !== undefined && saved !== '') {
                slider.value = saved;
                display.textContent = saved;
                slider.disabled = true;
                slider.classList.add('opacity-50');
                if (lockBtn) { lockBtn.classList.remove('hidden'); lockBtn.textContent = '🔒'; }
            } else {
                slider.disabled = false;
                slider.classList.remove('opacity-50');
                if (lockBtn) lockBtn.classList.add('hidden');
                slider.value = opt.最低分;
                display.textContent = opt.最低分;
            }
        });
    }
    
    function calculateRecordsTotalSum(records) {
        return records.reduce((sum, rec) => sum + (parseFloat(rec['總分']) || 0), 0);
    }
    
    function renderHistorySection(records, title, color, sectionTotalSum) {
        if (!records.length) {
            return `<div class="mb-4 p-4 border-l-4 rounded-lg" style="border-left-color:${color}"><h4 class="font-bold" style="color:${color}">${title}</h4><div class="text-gray-500">無記錄</div></div>`;
        }
        const sorted = [...records].sort((a,b) => new Date(b.評分日期) - new Date(a.評分日期));
        return `
            <div class="mb-6 p-4 border-l-4 rounded-lg" style="border-left-color:${color}">
                <h4 class="text-xl font-bold mb-3" style="color:${color}">${title}</h4>
                
                ${sorted.map((rec, idx) => {
                    const isLatest = idx === 0;
                    let detail = Object.keys(rec).filter(k => !['員工編號','員工姓名','評核人','總分','評分日期'].includes(k) && rec[k] && rec[k] !== '').map(k => `<p class="ml-4 text-sm"><span class="font-medium">${k}:</span> ${rec[k]}${k.includes('評語') ? '' : ' 分'}</p>`).join('');
                    return `<div class="mb-3 p-3 rounded-lg border ${isLatest ? 'bg-green-50 border-green-400' : 'bg-white'}">
                                <div class="flex justify-between"><strong>總分: <span class="text-green-600 text-2xl">${rec['總分']}</span></strong> <span class="text-xs">${rec['評分日期']?.slice(0,10) || ''}</span></div>
                                ${detail && `<div class="mt-2 text-sm">${detail}</div>`}
                                ${isLatest ? '<p class="text-red-500 text-xs mt-2">⚠️ 再次提交將覆蓋此筆最新評分</p>' : ''}
                            </div>`;
                }).join('')}
            </div>`;
    }
    
    function renderCombinedHistory(allHistory, tourSum, interviewSum, combined) {
        return `
            <div class="p-5 mb-6 bg-gradient-to-r from-blue-50 to-indigo-50 rounded-2xl shadow-md text-center">
                <div class="text-2xl font-black text-indigo-800">🏆 總積分 (考察團+會面)</div>
                <div class="text-5xl font-extrabold text-red-600 my-2">${combined.toFixed(1)}</div>
                <div class="text-sm text-gray-600">考察團累積 ${tourSum.toFixed(1)}  +  會面累積 ${interviewSum.toFixed(1)}</div>
            </div>
            ${renderHistorySection(allHistory.tour, '📸 考察團評分紀錄', '#2c7da0', tourSum)}
            ${renderHistorySection(allHistory.interview, '💬 會面評分紀錄', '#2c7da0', interviewSum)}
        `;
    }
    
    // ======================== 提交評分 (含評語) ========================
    function prepareEvaluationData(options, prefix, commentId) {
        const data = {
            '員工編號': currentEmployee.員工編號,
            '員工姓名': currentEmployee.員工姓名,
            '評核人': currentEvaluator,
            '評分日期': new Date().toISOString(),
            '總分': 0
        };
        let total = 0;
        options.forEach((opt, idx) => {
            const slider = document.getElementById(`${prefix}-rating-${idx}`);
            if (slider) {
                const score = parseInt(slider.value);
                data[opt.評分項目] = score;
                total += score;
            }
        });
        data['總分'] = total;
        if (commentId) {
            const comment = document.getElementById(commentId)?.value.trim() || '';
            data['評語'] = comment;
        }
        return data;
    }
    
    async function submitSingleEvaluation(sheetName, evalData) {
        const formData = new URLSearchParams();
        formData.append("action", "saveEvaluation");
        formData.append("sheetName", sheetName);
        formData.append("data", JSON.stringify(evalData));
    
        const response = await fetch(scriptURL, {
            method: "POST",
            body: formData
        });
    
        const result = await response.json();
    
        if (!result.success) {
            throw new Error(result.message || result.error || "提交失敗");
        }
    
        return evalData['總分'];
    }
    
    async function submitAllEvaluations() {
        if (!currentEvaluator || !currentEmployee) {
            showCustomMessage('請先登入並選擇員工', 'error');
            return;
        }
        const btn = document.getElementById('submitAllButton');
        const originalText = btn.textContent;
        btn.disabled = true;
        btn.textContent = '提交中...';
        try {
            const tourData = prepareEvaluationData(ratingOptions, 'tour', 'tour-comment');
            const interviewData = prepareEvaluationData(interviewRatingOptions, 'interview', 'interview-comment');
            await Promise.all([
                submitSingleEvaluation(SHEETS.TOUR_SCORE, tourData),
                submitSingleEvaluation(SHEETS.INTERVIEW_SCORE, interviewData)
            ]);
            showCustomMessage(`✅ 所有評分（考察團、會面）已成功提交！`, 'success');
            setTimeout(() => {
                loadHistoryRatings(currentEmployee.員工編號, currentEvaluator);
                loadAllData();
            }, 1500);
        } catch (err) {
            console.error(err);
            showCustomMessage('提交失敗，請檢查網路', 'error');
        } finally {
            setTimeout(() => { btn.disabled = false; btn.textContent = originalText; }, 2000);
        }
    }
    
    // ======================== 顯示員工詳細 (含兩個評分區塊) ========================
    function showEmployeeDetail(employeeId) {
        currentEmployee = allEmployees.find(emp => emp.員工編號 === employeeId);
        if (!currentEmployee) return;
        document.getElementById('employeeList').style.display = 'none';
        document.getElementById('employeeDetail').style.display = 'block';
        updateReturnButtonState(false);
        displayAllInfo();
        loadHistoryRatings(employeeId, currentEvaluator);
    }
    
    function displayAllInfo() {
        const emp = currentEmployee;
        const edu = educationData.filter(e => e.員工編號 === emp.員工編號);
        const exp = experienceData.filter(e => e.員工編號 === emp.員工編號);
        const empRec = employmentData.filter(e => e.員工編號 === emp.員工編號);
        const photoUrl = emp.員工照片?.startsWith('http') ? emp.員工照片 : null;
        const photoHtml = photoUrl ? `<img src="${photoUrl}" class="w-32 h-48 object-cover rounded-lg shadow mb-3" onerror="this.src='https://placehold.co/128x192/004d99/ffffff?text=${(emp.員工姓名||'?')[0]}'">` 
            : `<div class="w-32 h-48 flex items-center justify-center bg-gray-200 rounded-lg text-gray-500 text-3xl">${(emp.員工姓名||'無').substring(0,2)}</div>`;
        
        const content = document.getElementById('basicContent');
        content.innerHTML = `
            <div class="detail-section"><h3>👤 基本資料 - ${emp.員工姓名}</h3>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div class="md:col-span-2 space-y-1">
                        <p><strong>員工編號：</strong>${emp.員工編號 || '未填寫'}</p>
                        <p><strong>年齡：</strong>${emp.年齡 || '未填寫'}</p>
                        <p><strong>婚姻狀況：</strong>${emp.婚姻狀況 || '未填寫'}</p>
                        <p><strong>到職日期：</strong>${emp.到職日期 || '未填寫'}</p>
                        <p><strong>子女數目：</strong>${emp.子女數目 || '0'}</p>
                        <p><strong>職位：</strong>${emp.職位 || '未填寫'}</p>
                        <p><strong>地域：</strong>${emp.地域 || '未填寫'}</p>
                        <p><strong>部門/分區：</strong>${emp.部門 || '未填寫'}</p>
                        <p><strong>績效評估等級2023：</strong>${emp.績效評估等級2023 || '未填寫'}</p>
                        <p><strong>績效評估等級2024：</strong>${emp.績效評估等級2024 || '未填寫'}</p>
                        <p><strong>服務年資：</strong>${emp.服務年資 || '未填寫'}</p>
                    </div>
                    <div class="flex flex-col items-center">${photoHtml}</div>
                </div>
            </div>
            
            <!-- 學歷資格 -->
            <div class="detail-section">
                <h3>🎓 學歷／專業資格</h3>
                ${edu.length > 0 ? edu.map(record => `
                    <div class="education-record border-b pb-2 mb-2">
                        <p><strong>期間：</strong>${record.由 || ''} - ${record.至 || ''}</p>
                        <p><strong>學院名稱：</strong>${record.學院名稱 || ''}</p>
                        <p><strong>所獲證書/資格：</strong>${record.所獲證書資格 || ''}</p>
                    </div>
                `).join('') : '<div class="no-data text-gray-500">沒有學歷資格紀錄</div>'}
            </div>
            
            <!-- 工作經驗 -->
            <div class="detail-section">
                <h3>🏢 工作經驗</h3>
                ${exp.length > 0 ? exp.map(record => `
                    <div class="experience-record border-b pb-2 mb-2">
                        <p><strong>期間：</strong>${record.由 || ''} - ${record.至 || ''}</p>
                        <p><strong>公司名稱：</strong>${record.公司名稱 || ''}</p>
                        <p><strong>離職時職位：</strong>${record.離職時職位 || ''}</p>
                        <p><strong>該工作年資：</strong>${record.該職位年資 || ''}</p>
                    </div>
                `).join('') : '<div class="no-data text-gray-500">沒有工作經驗紀錄</div>'}
            </div>
            
            <!-- 康業受僱紀錄 -->
            <div class="detail-section">
                <h3>📋 康業受僱紀錄</h3>
                ${empRec.length > 0 ? empRec.map(record => `
                    <div class="employment-record border-b pb-2 mb-2">
                        <p><strong>期間：</strong>${record.由 || ''} - ${formatEndDate(record.至)}</p>
                        <p><strong>分區：</strong>${record.分區 || ''}</p>
                        <p><strong>大廈：</strong>${record.大廈 || ''}</p>
                        <p><strong>職位：</strong>${record.職位 || ''}</p>
                        <p><strong>年資：</strong>${record.年資 || ''}</p>
                    </div>
                `).join('') : '<div class="no-data text-gray-500">沒有受僱紀錄</div>'}
            </div>

            <!-- 歷史評分紀錄 -->
            <div class="detail-section mt-8"><h3>📜 歷史評分紀錄 (${currentEvaluator})</h3><div id="historyRatingsContainer">載入中...</div></div>
            
            <!-- 考察團評分表單 -->
            <div class="evaluation-form">
                <h3>📸 考察團整體評分</h3>
                <div class="evaluator-display">評核人：${currentEvaluator}</div>
                <div id="tourRatingItemsContainer">${generateRatingItems(ratingOptions, 'tour')}</div>
                <div class="score-breakdown" id="tourScoreBreakdown">${generateScoreBreakdown(ratingOptions, 'tour')}</div>
                <div class="total-score" id="tourTotalScore"></div>
                <div class="mt-5"><label class="block font-medium">評語 (考察團)</label><textarea id="tour-comment" class="w-full p-2 border rounded-lg resize-y" rows="2" placeholder="請輸入考察團評語 (選填)"></textarea></div>
            </div>
            
            <!-- 會面評分表單 -->
            <div class="interview-form">
                <h3>💬 會面評分</h3>
                <div class="evaluator-display">評核人：${currentEvaluator}</div>
                <div id="interviewRatingItemsContainer">${generateRatingItems(interviewRatingOptions, 'interview')}</div>
                <div class="score-breakdown" id="interviewScoreBreakdown">${generateScoreBreakdown(interviewRatingOptions, 'interview')}</div>
                <div class="total-score" id="interviewTotalScore"></div>
                <div class="mt-5"><label class="block font-medium">評語 (會面)</label><textarea id="interview-comment" class="w-full p-2 border rounded-lg resize-y" rows="2" placeholder="請輸入會面評語 (選填)"></textarea></div>
            </div>
            
            <div class="text-center mt-6">
                <button class="submit-button" id="submitAllButton" onclick="submitAllEvaluations()">📌 提交評分 (考察團 + 會面)</button>
            </div>
        `;
        
        setupRatingSliders(ratingOptions, 'tour');
        setupRatingSliders(interviewRatingOptions, 'interview');
        updateTotalScore(ratingOptions, 'tour');
        updateTotalScore(interviewRatingOptions, 'interview');
        initDirtyTrackers();
    }
    
    function formatEndDate(date) { if(!date) return ''; return new Date(date) >= new Date() ? '現在' : date; }
    function getEmployeeIdFromURL() { return new URLSearchParams(location.search).get("employeeId"); }
    function handleHash() { if(location.hash.startsWith('#detail-')) showEmployeeDetail(location.hash.slice(8)); }
    
    function showEmployeeList() {
        if (isDirty && !confirm("您有未儲存的評分變更，確定要離開嗎？")) return;
        document.getElementById('employeeDetail').style.display = 'none';
        document.getElementById('employeeList').style.display = 'block';
        currentEmployee = null;
        updateReturnButtonState(true);
        isDirty = false;
    }
    
    function logout() { if(confirm("登出後將返回登入頁面")){ localStorage.removeItem("currentEvaluator"); window.location.href="login.html"; } }
    function Ranklist() { window.location.href="RankList.html"; }
    
    // 初始化
    document.addEventListener('DOMContentLoaded', async () => {
        await loadRatingDescriptions();
        const saved = localStorage.getItem("currentEvaluator");
        if (!saved) { window.location.href = "login.html"; return; }
        currentEvaluator = saved;
        document.getElementById("currentEvaluatorDisplay").innerText = currentEvaluator;
        const empId = getEmployeeIdFromURL();
        if (empId) {
            updateReturnButtonState(false);
            await loadAllData();
            showEmployeeDetail(empId);
        } else {
            updateReturnButtonState(true);
            await loadAllData();
        }
        window.addEventListener('hashchange', handleHash);
    });
    </script>
</body>
</html>
