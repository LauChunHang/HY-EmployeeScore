            // upload data from google sheet
            async function loadSheetData(sheetName) {
                // Since we are using an App Script for evaluation data, the Sheets API for basic employee data is fine.
                const url = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${encodeURIComponent(sheetName)}?key=${API_KEY}`;
                try {
                    const response = await fetch(url);
                    const data = await response.json();
                    if (!data.values) return [];
                    const headers = data.values[0];
                    const rows = data.values.slice(1);
                    return rows.map(row => {
                        const obj = {};
                        headers.forEach((header, index) => obj[header] = row[index] || '');
                        return obj;
                    });
                } catch (error) {
                    console.error(`加載 ${sheetName} 失敗:`, error);
                    return [];
                }
            }
        
            // NEW FUNCTION: 載入當前評核人對所有員工的最新評分
            async function loadAllEvaluatorRatings(evaluator) {
                if (!evaluator) return [];
                const url = `${scriptURL}?action=getAllEvaluatorRatings&evaluator=${encodeURIComponent(evaluator)}`;
                try {
                    const response = await fetch(url);
                    const result = await response.json();
                    if (result.success) {
                        console.log('所有評分載入成功:', result.data);
                        return result.data;
                    } else {
                        console.error("載入所有評分失敗:", result.message);
                        return [];
                    }
                } catch (error) {
                    console.error("載入所有評分失敗:", error);
                    return [];
                }
            }
            function handleHash() {
            if (location.hash.startsWith('#detail-')) {
                const employeeId = location.hash.substring(8); // 移除 '#detail-'
                if (employeeId && allEmployees.length > 0) {
                    const employee = allEmployees.find(emp => emp.員工編號 === employeeId);
                    if (employee) {
                        showEmployeeDetail(employeeId);
                        return true;
                    }
                }
            }
            return false;
        }

                const [basic, education, experience, employment, ratings, interviewRatings, evaluators, allRatings] = await Promise.all([
                    loadSheetData(SHEETS.BASIC),
                    loadSheetData(SHEETS.EDUCATION),
                    loadSheetData(SHEETS.EXPERIENCE),
                    loadSheetData(SHEETS.EMPLOYMENT),
                    loadSheetData(SHEETS.RATING),
                    loadSheetData(SHEETS.INTERVIEW_RATING),
                    loadSheetData(SHEETS.EVALUATORS),

                ]);
                allEmployees = basic;
                educationData = education;
                experienceData = experience.map(record => ({
                    ...record,
                    // 確保「入職前總年資」字段存在，即使為空，避免模板渲染問題
                    '入職前總年資': record['入職前總年資'] || ''
                }));
                employmentData = employment;
                evaluatorList = evaluators.map(e => e.評核人姓名 || e.評核人);
                // 考察團評分選項
            
                // 會面評分選項
                interviewRatingOptions = interviewRatings.map(row => ({
                    '評分項目': row['評分項目'] || '未命名',
                    '最低分': parseInt(row['最低分']) || 0,
                    '最高分': parseInt(row['最高分']) || 5
                }));
                // 處理所有評分數據，轉為以員工編號為鍵的映射
                employeeScores = allRatings.reduce((acc, score) => {
                    acc[score.員工編號] = score;
                    return acc;
                }, {});
                displayEmployees(allEmployees);
                hideLoading();
                handleHash();
                return true;
            }
            window.addEventListener('hashchange', handleHash);

                    const scores = employeeScores[emp.員工編號] || {};
                
                    // 檢查分數是否存在
                    const tourTotal = scores.tourTotal !== null && scores.tourTotal !== undefined ? scores.tourTotal : null;
                    const interviewTotal = scores.interviewTotal !== null && scores.interviewTotal !== undefined ? scores.interviewTotal : null;
                    // 格式化顯示
                    const tourScoreDisplay = tourTotal !== null

            function formatEndDate(endDate) {
            if (!endDate) return '';

            const today = new Date();
            today.setHours(0, 0, 0, 0);

            const end = new Date(endDate);
            end.setHours(0, 0, 0, 0);

            // 如果「至」是今天或未來 → 視為仍在職
            if (!isNaN(end) && end >= today) {
                return '現在';
            }

            // 正常顯示日期
            return endDate;
        }

            // history
            

        // 修改：載入歷史評分後，自動設定滑桿位置
        // 修改：載入歷史評分後，自動設定滑桿位置 + 評語
        async function loadHistoryRatings(employeeId, evaluator) {
            const container = document.getElementById('historyRatingsContainer');
            if (!container) return;

            container.innerHTML = '<div class="no-data text-center p-5 text-blue-500">正在載入歷史評分...</div>';

            try {
                const url = `${scriptURL}?action=getRatings&employeeId=${encodeURIComponent(employeeId)}&evaluator=${encodeURIComponent(evaluator)}`;
                console.log("發送請求到:", url); // ← 加這行看 console 確認 URL 正確

                const response = await fetch(url, {
                    method: 'GET',
                    mode: 'cors',
                    credentials: 'omit'
                });

                if (!response.ok) {
                    throw new Error(`HTTP 錯誤 ${response.status}`);
                }

                const result = await response.json();
                console.log("後端回傳:", result); // ← 加這行看 console 是否有資料

                if (!result.success || !result.data) {
                    container.innerHTML = '<div class="no-data text-center p-5 bg-gray-100 rounded-lg text-gray-500">無相關歷史評分記錄。</div>';
                    return;
                }

                const { tour = [], interview = [] } = result.data || {};

                const latestTour = tour[0] || {};
                const latestInterview = interview.length > 0 ? interview[0] : null;

                if (latestInterview) {
                    setSlidersToLatest(latestInterview, interviewRatingOptions, 'interview');
                    updateTotalScore(interviewRatingOptions, 'interview');

                    // ⭐ 新增：自動填入上次評語
                    const savedComment = latestInterview['評語'] || latestInterview['評語 (會面)'] || ''; // 確認欄位名，如果不同可調整
                    const commentTextarea = document.getElementById('interview-comment');
                    if (commentTextarea) {
                        commentTextarea.value = savedComment;
                    }
                }

                const tourTotalSum = calculateRecordsTotalSum(tour);
                const interviewTotalSum = calculateRecordsTotalSum(interview);
                const combinedTotalSum = tourTotalSum + interviewTotalSum;

                container.innerHTML = renderCombinedHistory(
                    { tour, interview },
                    tourTotalSum,
                    interviewTotalSum,
                    combinedTotalSum
                );
                setTimeout(() => {
            initRatingTracker(interviewRatingOptions, 'interview');
        }, 800);

            } catch (error) {
                console.error("載入歷史失敗:", error);
                container.innerHTML = `
                    <div class="no-data text-center p-5 border border-red-400 bg-red-100 text-red-700 rounded-lg">
                        無法載入歷史記錄<br>

                                class="mt-3 px-4 py-2 bg-blue-500 text-white rounded hover:bg-blue-600">

        }
        // 將滑桿設定為最新評分
        function setSlidersToLatest(latestRecord, options, prefix) {
            options.forEach((option, index) => {
                const slider = document.getElementById(`${prefix}-rating-${index}`);
                const display = document.getElementById(`${prefix}-value-${index}`);
                const lockBtn = document.getElementById(`${prefix}-lock-${index}`);
                if (!slider || !display) return;
                const savedScore = latestRecord[option.評分項目];
                if (savedScore !== undefined && savedScore !== '') {
                    slider.value = savedScore;
                    display.textContent = savedScore;
                    // 🔒 有歷史 → 鎖住 + 顯示鎖
                    slider.disabled = true;
                    slider.classList.add('opacity-50', 'cursor-not-allowed');
                    lockBtn?.classList.remove('hidden');
                    lockBtn.textContent = '🔒';
                } else {
                    // 🆕 沒歷史 → 不鎖、不顯示
                    slider.disabled = false;
                    slider.value = option.最低分;
                    display.textContent = option.最低分;
                
                }
            });
        }

       function initRatingTracker(options, prefix) {
    isDirty = false;
    initialScores = {};
    currentScores = {};

    options.forEach((option, index) => {
        const slider = document.getElementById(`${prefix}-rating-${index}`);
        if (slider) {
            const val = slider.value;
            initialScores[option.評分項目] = val;
            currentScores[option.評分項目] = val;

            // 監聽滑桿即時變動
            slider.removeEventListener('input', handleSliderChange); // 防止重複綁定
            slider.addEventListener('input', handleSliderChange);
            
            // 存儲 metadata 方便 handleSliderChange 讀取
            slider.dataset.itemName = option.評分項目;
        }
    });

    // 監聽評語框
    const commentBox = document.getElementById(`${prefix}-comment`);
    if (commentBox) {
        initialScores['評語'] = commentBox.value;
        currentScores['評語'] = commentBox.value;
        commentBox.addEventListener('input', (e) => {
            currentScores['評語'] = e.target.value;
            checkDirtyState();
        });
    }
    console.log("追蹤器已初始化成功，初始值：", initialScores);
}

function handleSliderChange(e) {
    const itemName = e.target.dataset.itemName;
    currentScores[itemName] = e.target.value;
    checkDirtyState();
}

function checkDirtyState() {
    isDirty = Object.keys(initialScores).some(key => 
        String(initialScores[key]) !== String(currentScores[key])
    );
}

// 新增：鎖定所有滑桿
function lockAllSliders() {
    Object.keys(currentScores).forEach(key => {
        const slider = document.querySelector(`input[data-item-name="${key}"]`);
        if (slider) {
            slider.disabled = true;
            slider.classList.add('opacity-50', 'cursor-not-allowed');
        }
    });
}

// Helper function to render the combined history view

// UPDATED: 接收並顯示累積總和 (單獨區塊總和)
            function renderHistorySection(records, title, color, sectionTotalSum) {
                if (records.length === 0) {
                    return `
                        <div class="mb-6 p-4 border-l-4 rounded-lg shadow-inner" style="border-left-color: ${color}; background-color: ${color}10;">
                            <h4 class="text-xl font-bold mb-4" style="color: ${color};">${title} </h4>
                            <!-- 🏆 累積總分顯示 -->
                            <div class="p-4 mb-4 bg-white rounded-xl shadow-lg text-center border-b-4 border-indigo-400">
                                <h5 class="text-lg font-semibold text-gray-700">未評分</h5>
                                <p class="text-5xl font-black text-indigo-700 mt-1">${sectionTotalSum.toFixed(1)}</p>
                                <p class="text-xs text-gray-500 mt-2"></p>
                            </div>
                            <div class="no-data text-center p-4 bg-gray-50 rounded text-gray-500">無${title}</div>
                        </div>
                    `;
                }
                
                const sortedRecords = records.sort((a, b) => {
                    const dateA = new Date(a.評分日期 || '2000-01-01');
                    const dateB = new Date(b.評分日期 || '2000-01-01');
                    return dateB - dateA; // 最新日期在前
                });
                
                return `
                    <div class="mb-6 p-4 border-l-4 rounded-lg shadow-inner" style="border-left-color: ${color}; background-color: ${color}10;">
                        <h4 class="text-xl font-bold mb-4" style="color: ${color};">${title}</h4>
                        
                        
                        
                        ${sortedRecords.map((record, index) => {
                            const isLatest = index === 0;
                            let detailHtml = Object.keys(record).map(key => {
                                // 排除核心欄位，只顯示評分項目
                                if (!['員工編號', '員工姓名', '評核人', '總分', '評分日期'].includes(key) && 
                                    record[key] !== undefined && record[key] !== '' && record[key] != null) {
                                    return `<p class="ml-4 text-sm text-gray-700"><span class="font-medium">${key}:</span> <strong>${record[key]}</strong> 分</p>`;
                                }
                                return '';
                            }).filter(html => html !== '').join('');

                            return `
                                <div class="history-record mb-4 p-4 border rounded-lg transition-shadow ${isLatest ? 'border-green-500 bg-green-50 shadow-md' : 'border-gray-200 bg-white'}">
                                    <div class="flex justify-between items-center mb-2">
                                        <div>
                                            <p class="text-xl font-bold" style="color: ${color};">
                                                總分: <span class="text-green-600 text-2xl">${record['總分'] || 'N/A'}</span>
                                            </p>
                                            <p class="text-sm text-gray-600">
                                                <strong>評分日期：</strong>${record['評分日期'] ? new Date(record['評分日期']).toLocaleDateString('zh-TW', { year: 'numeric', month: '2-digit', day: '2-digit' }) : 'N/A'}
                                            </p>
                                        </div>
                                    
                                    </div>
                                
                                    ${detailHtml ? `
                                    
                                        <div class="pt-2">
                                            ${detailHtml}
                                        </div>
                                
                                    ` : ''}
                                
                                    ${isLatest ? `
                                    <p class="text-red-500 font-bold mt-3 text-sm border-t pt-2 border-red-200">
                                        *如果您再次提交評分，將會覆蓋此紀錄。
                                    </p>
                                    ` : ''}
                                </div>
                            `;
                        
                        }).join('')}
                    </div>
                `;
            }
            function renderCombinedHistory(allHistory, tourTotalSum, interviewTotalSum, combinedTotalSum) {
            let combinedTotalHtml = '';
            if (combinedTotalSum > 0) {
                combinedTotalHtml = `
                    <div class="p-6 mb-8 rounded-xl shadow-2xl text-center border-4 border-blue-400">
                        <h5 class="text-xl font-bold text-gray-800 mb-2">會面總分</h5>
                        <p class="text-6xl font-black text-blue-600 mt-1">${combinedTotalSum.toFixed(1)}</p>
                    
                    </div>
                `;
            } else {
                combinedTotalHtml = `
                    <div class="p-4 mb-4 bg-gray-100 rounded-lg text-gray-500 text-center">
                        無會面評分歷史數據。
                    </div>
                `;
            }
            
            return `
                ${combinedTotalHtml}
                ${renderHistorySection(allHistory.interview, '會面評分紀錄', '#004d99', interviewTotalSum)}
            `;
        }
            function calculateRecordsTotalSum(records) {
                if (!Array.isArray(records)) {
                    return 0;
                }
                // records 陣列中的每個物件都有一個 '總分' 欄位
                return records.reduce((sum, record) => {
                    // 嘗試將 '總分' 解析為浮點數，如果不是有效數字則視為 0
                    const score = parseFloat(record['總分']);
                    return sum + (isNaN(score) ? 0 : score);
                }, 0);
            }
            // 生成評分滑桿
        function generateRatingItems(options, prefix) {
  return options.map((option, index) => {
    const description =
      option.說明 ||
      ratingDescriptions[option.評分項目] ||
      "暫無詳細說明。";

    return `
      <div class="rating-item mb-5">
        
        <!-- 標題 + ⓘ -->
        <div class="rating-header mb-1 flex items-center gap-2">
          <span class="rating-title font-medium text-gray-800">
            ${option.評分項目}
          </span>
          <span class="text-xs text-gray-500">

          </span>

function toggleDescription(prefix, index) {
  const el = document.getElementById(`desc-${prefix}-${index}`);
  if (!el) return;

  el.classList.toggle('hidden');
}


       function toggleTooltip(prefix, index) {
    const targetId = `tooltip-${prefix}-${index}`;
    const allTooltips = document.querySelectorAll('.tooltip-box');
    
    allTooltips.forEach(box => {
        if (box.id === targetId) {
            box.classList.toggle('show');
        } else {
            box.classList.remove('show');
        }
    });
}


            document.addEventListener('click', function(e) {
                if (!e.target.classList.contains('info-trigger')) {
                    document.querySelectorAll('.tooltip-box').forEach(box => {
                        box.classList.remove('show');
                    });
                }
            });

        function toggleSliderLock(prefix, index) {
            const slider = document.getElementById(`${prefix}-rating-${index}`);
            const lockBtn = document.getElementById(`${prefix}-lock-${index}`);
            if (!slider) return;
            const locked = slider.disabled;
            slider.disabled = !locked;
            if (slider.disabled) {
                slider.classList.add('opacity-50', 'cursor-not-allowed');
                lockBtn.textContent = '🔒';
            } else {
                slider.classList.remove('opacity-50', 'cursor-not-allowed');
                lockBtn.textContent = '🔓';
            }
        }
            // 生成分數明細
            function generateScoreBreakdown(options, prefix) {
                return options.map((option, index) => `
                    <div class="score-item" id="${prefix}-breakdown-${index}">
                        <span>${option.評分項目}:</span>
                        <span>${option.最低分} 分</span>
                    </div>
                `).join('');
            }

        let ratingDescriptions = {};
            async function loadRatingDescriptions() {
                try {
                    // 使用你現有的 scriptURL
                    const response = await fetch(`${scriptURL}?action=getRatingDescriptions`);
                    const result = await response.json();
                    if (result.success) {

                        console.log("說明載入成功:", ratingDescriptions);

            // 在頁面初始化時確保執行
            async function initPage() {

                if (typeof loadAllData === 'function') loadAllData(); 
            }

        initPage();
    });



            // 計算最大可能分數
            function calculateMaxScore(options) {
                return options.reduce((total, option) => total + option.最高分, 0);
            }
            // 設置評分滑桿事件
            function setupRatingSliders(options, prefix) {
                options.forEach((option, index) => {
                    const slider = document.getElementById(`${prefix}-rating-${index}`);
                    const valueDisplay = document.getElementById(`${prefix}-value-${index}`);
                    if (slider && valueDisplay) {
                        slider.addEventListener('input', () => {
                            valueDisplay.textContent = slider.value;
                            updateTotalScore(options, prefix);
                        });
                    }
                });
            }
            // 更新總分
            function updateTotalScore(options, prefix) {
                let totalScore = 0;
                options.forEach((option, index) => {
                    const slider = document.getElementById(`${prefix}-rating-${index}`);
                    const breakdown = document.getElementById(`${prefix}-breakdown-${index}`);
                    if (slider && breakdown) {
                        const score = parseInt(slider.value);
                        totalScore += score;
                        breakdown.innerHTML = `<span>${option.評分項目}:</span><span>${score} 分</span>`;
                    }
                });
                document.getElementById(`${prefix}TotalScore`).textContent = `總分: ${totalScore} / ${calculateMaxScore(options)}`;
            }
        
            // Helper function to prepare data for a single submission
            function prepareEvaluationData(options, prefix) {
                const evaluationData = {
                    '員工編號': currentEmployee.員工編號,
                    '員工姓名': currentEmployee.員工姓名,
                    '評核人': currentEvaluator,
                    '評分日期': new Date().toISOString(),
                    '總分': 0,
                    '評語': document.getElementById('interview-comment').value.trim() || ''  // 新增：獲取評語
                };
                let totalScore = 0;
                options.forEach((option, index) => {
                    const slider = document.getElementById(`${prefix}-rating-${index}`);
                    if (slider) {
                        const score = parseInt(slider.value);
                        evaluationData[option.評分項目] = score;
                        totalScore += score;
                    }
                });
                evaluationData['總分'] = totalScore;
                return evaluationData;
            }
            // Core function to submit a single evaluation type
            async function submitEvaluationSingle(sheetName, evaluationData) {
                console.log(`提交 ${sheetName} 數據:`, evaluationData);
            
                // 使用 no-cors 模式發送到 App Script
                const response = await fetch(scriptURL, {
                    method: "POST",
                    mode: 'no-cors', // Cannot check response.ok in this mode, rely on network success.
                    body: JSON.stringify({
                        action: "saveEvaluation",
                        sheetName: sheetName,
                        data: evaluationData
                    })
                });
                // Since it's no-cors, we assume success if the fetch completes without a network error.
                if (response) {
                    return { success: true, sheet: sheetName, total: evaluationData['總分'] };
                } else {
                    // This case might not be hit often due to no-cors, but kept for robustness.
                    throw new Error(`網路請求失敗 (${sheetName})`);
                }
            }
            // NEW: Combined function to submit both evaluations
            async function submitAllEvaluations() {
            const button = document.getElementById('submitAllButton');
            if (!currentEvaluator || !currentEmployee) {
                showCustomMessage('請先登入並選擇員工', 'error');
                return;
            }
            const originalButtonText = button.textContent;
        
            try {
                button.disabled = true;
                button.textContent = '處理中... 請勿關閉';
                showCustomMessage('開始提交會面評分...', 'info');
                const interviewData = prepareEvaluationData(interviewRatingOptions, 'interview');
                const interviewResult = await submitEvaluationSingle(SHEETS.INTERVIEW_SCORE, interviewData);
                showCustomMessage(`會面評分 (${interviewResult.total} 分) 已成功提交！`, 'success');
                setTimeout(() => {
                    loadHistoryRatings(currentEmployee.員工編號, currentEvaluator);
                    loadAllData();
                }, 3000);
            } catch (error) {
                console.error("提交會面評分失敗:", error);
                showCustomMessage(`提交失敗：${error.message}`, 'error');
            } finally {
                setTimeout(() => {
                    button.disabled = false;
                    button.textContent = originalButtonText;
                }, 3500);
            }
        }

    isDirty = false;
}
            // 返回員工列表
function showEmployeeList() {
    console.log("當前是否被修改 (isDirty):", isDirty);
    
    if (isDirty) {
        // 找出所有被修改過的項目
        const changes = Object.keys(initialScores)
            .filter(key => String(initialScores[key]) !== String(currentScores[key]))
            .map(key => {
                const oldVal = initialScores[key];
                const newVal = currentScores[key];
                return `• ${key}: ${oldVal} → ${newVal}`;
            })
            .join('\n');

        const confirmMessage = `⚠️ 您有尚未儲存的修改：\n\n${changes}\n\n確定要放棄修改並返回嗎？`;
        
        if (!confirm(confirmMessage)) {
            return; // 使用者點選取消，停留在頁面
        }
    }

    // 執行返回邏輯
    const detailView = document.getElementById('employeeDetail');
    const listView = document.getElementById('employeeList');
    
    if (detailView) detailView.style.display = 'none';
    if (listView) listView.style.display = 'block';
    
    currentEmployee = null;
    isDirty = false; // 返回後重置
    
    if (typeof updateReturnButtonState === 'function') {
        updateReturnButtonState(true);
    }
}
